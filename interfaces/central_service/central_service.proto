syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package central_service;

import "data_models/data_models.proto";

option go_package = "github.com/vtpl1/vrtc/gen/centralservice";

service CentralService {
  rpc ReadMediaChannels(ReadMediaChannelsRequest) returns (stream ReadMediaChannelsResponse) {}
  rpc ReadMetadataChannels(ReadMetadataChannelsRequest) returns (stream ReadMetadataChannelsResponse) {}
}

message ReadMediaChannelsRequest {
  int64 site_id = 1;
}

message ReadMediaChannelsResponse {
  repeated data_models.Channel channel = 2;
}

message ReadMetadataChannelsRequest {
  int64 site_id = 1;
}

message ReadMetadataChannelsResponse {
  repeated data_models.Channel channel = 2;
}
