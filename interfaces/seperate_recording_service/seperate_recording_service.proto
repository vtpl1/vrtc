syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package seperate_recording_service;

option go_package = "github.com/vtpl1/vrtc/gen/seperaterecordingservice";

service SeperateRecordingService {
  rpc getChannelStatus(GetChannelStatusRequest) returns (GetChannelStatusResponse) {}
}

message GetChannelStatusRequest {
  int32 channel_id = 1;
}

message GetChannelStatusResponse {
  int64 error_code = 1;
  ChannelStatus channel_status = 2;
}

message ChannelStatus {
  int32 channel_id = 1;
  bool redundant_channel = 2;
  bool primary_recording = 3;
  int32 motion_recording = 4;
  bool redundant_recording = 5;
  int32 major_stream = 6;
  int32 minor_stream = 7;
  int32 third_stream = 8;
  int32 major_fps = 9;
  int32 minor_fps = 10;
  int32 third_stream_fps = 11;
  int32 major_bitrate = 12;
  int32 minor_bitrate = 13;
  int32 third_stream_bitrate = 14;
  int32 major_client_count = 15;
  int32 minor_client_count = 16;
  int32 third_stream_client_count = 17;
  int64 timestamp = 18;
  int64 camera_up_timestamp = 19;
  int64 camera_down_timestamp = 20;
  int64 remaining_missing_clip_in_ms = 21;
  int64 remaining_time_to_download_in_ms = 22;
  int64 primary_recording_stopped_at = 23;
  int32 ping_status = 24;

  AnalyticsStatus analytics_status = 25;
}

message AnalyticsStatus {
  int32 channel_id = 1;
  string receiver_worker_id = 2;
  int32 analytics_stream = 3;
  int32 analytics_grabbed_fps = 4;
  int32 analytics_grabbed_bitrate = 5;
  int32 analytics_processed_fps = 6;
  int32 analytics_processed_bitrate = 7;
  int32 analytics_frame_dropped_count = 8;
}
