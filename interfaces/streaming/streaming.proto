syntax = "proto3";

package streaming;

import "media/media.proto";

option go_package = "github.com/vtpl1/vrtc/gen/streaming";

message ForwardRequest {
  media.MediaFrame frame = 1;
}
message ForwardResponse {
  int64 sequence = 1;
  string error = 2;
}

message SubscribeRequest {
  media.StreamID stream_id = 1;
  string node_id = 2;
}
message SubscribeResponse {
  media.MediaFrame frame = 1;
  string error = 2;
}

service StreamForwarder {
  // Forward: push frames from source to destination (client streaming).
  rpc Forward(stream ForwardRequest) returns (ForwardResponse) {}

  // Subscribe: pull frames from source (server streaming).
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse) {}

  // Relay: bidirectional proxy-to-proxy relay.
  rpc Relay(stream ForwardRequest) returns (stream ForwardResponse) {}
}
