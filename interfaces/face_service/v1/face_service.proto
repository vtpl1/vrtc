syntax = "proto3";

package face_service.v1;

option go_package = "github.com/vtpl1/vrtc/gen/faceservice";

service FaceService {
  rpc GetFaceDetails(GetFaceDetailsRequest) returns (GetFaceDetailsResponse) {}
  rpc GetFaceMatch(GetFaceMatchRequest) returns (GetFaceMatchResponse) {}
  rpc AddFaceToDB(AddFaceToDBRequest) returns (AddFaceToDBResponse) {}
  rpc ResetFaceDB(ResetFaceDBRequest) returns (ResetFaceDBResponse) {}
  rpc GetCountOfFacesInFaceDB(GetCountOfFacesInFaceDBRequest) returns (GetCountOfFacesInFaceDBResponse) {}
}

message Error {
  int64 code = 1;
  string msg = 2;
}

message GetFaceDetailsRequest {
  string face_bbox_json = 1;
  int32 face_confidence = 2;
  string img_hash = 3;
  bytes img_data = 4;
}

message GetFaceDetailsResponse {
  Error error = 1;
  string img_hash = 2;
  bytes face_feature = 3;
  string face_bbox_json = 4;
  int32 face_confidence = 5;
  string face_keypoints_json = 6;
  string pose_keypoints_json = 7;
  int32 qa_total_confidence = 8;
  string quality_json = 9;
}

message GetFaceMatchRequest {
  bytes face_feature = 1;
}

message GetFaceMatchResponse {
  Error error = 1;
  string img_hash = 2;
  int32 recognition_confidence = 3;
  int32 recognition_distance = 4;
  int32 recognition_far = 5;
  int32 recognition_frr = 6;
}

message AddFaceToDBRequest {
  string img_hash = 1;
  bytes face_feature = 2;
}

message AddFaceToDBResponse {
  Error error = 1;
  string img_hash = 2;
}

message ResetFaceDBRequest {}
message ResetFaceDBResponse {
  Error error = 1;
}
message GetCountOfFacesInFaceDBRequest {}
message GetCountOfFacesInFaceDBResponse {
  Error error = 1;
  int64 count = 2;
}
