syntax = "proto3";

package streaming_controller.v1;

import "data_models/data_models.proto";

option go_package = "github.com/vtpl1/vrtc/gen/streamingcontroller";

service StreamingControllerAPIService {
  rpc SaveClipData(SaveClipDataRequest) returns (SaveClipDataResponse);
  rpc RequestArchiveFile(RequestArchiveFileRequest) returns (stream RequestArchiveFileResponse);
  rpc UploadArchiveFile(stream UploadArchiveFileRequest) returns (UploadArchiveFileResponse);
}

message StreamControllerRequest {
  int64 site_id = 1;
  int32 channel_id = 2;
}

message StreamControllerResponse {
  int32 err = 1;
  string message = 2;
}

message SaveClipDataRequest {
  int64 site_id = 1;
  int32 channel_id = 2;
  int64 clip_size = 3; // 67
  string clip_url = 4; // /sdcard/P_Recording/IVMS/1/Clips/...
  int64 start_timestamp = 5; // epoch millis
  int64 end_timestamp = 6; // epoch millis
  string storage_path = 7; // /sdcard/
}

message SaveClipDataResponse {
  bool success = 1;
  string message = 2;
}

message RequestArchiveFileRequest {
  int64 site_id = 1;
}

message RequestArchiveFileResponse {
  repeated data_models.Channel channel = 1;
}

message UploadArchiveFileRequest {
  data_models.Channel channel = 1;
  bytes data = 2;
  int64 offset = 3;
}

message UploadArchiveFileResponse {
  bool success = 1;
  string message = 2;
}
