syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package stream_service_frs;

import "data_models/data_models.proto";

option go_package = "github.com/vtpl1/vrtc/gen/streamservicefrs";

service StreamService {
  rpc WriteFramePva(stream WriteFramePvaRequest) returns (WriteFramePvaResponse) {}
}

message WriteFramePvaRequest {
  string node_id = 1;
  string engine_id = 2;
  data_models.FramePVA frame_pva = 3;
}

message WriteFramePvaResponse {
  string node_id = 1;
  string engine_id = 2;
  data_models.Error error = 3;
}
