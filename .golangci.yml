version: "2"
run:
  timeout: 5m

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - ireturn
    - mnd
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    cyclop:
      max-complexity: 30
    gomoddirectives:
      replace-local: true
    lll:
      line-length: 180
    varnamelen:
      ignore-names:
        - a
        - b
        - c
        - c1
        - br   # bit reader
        - bw   # bit writer
        - cf   # chroma format
        - e
        - i
        - in
        - j    # secondary loop index
        - k    # scale factor
        - m
        - n    # loop counter and byte offset
        - ok
        - p    # byte-slice parameter
        - r    # reader
        - s    # struct receiver or writer
        - sd
        - sr   # sample-rate code byte
        - t    # temporary bit value
        - tt
        - u
        - U8
        - v
        - w
        - _b   # byte buffer in NALU parser
    gocognit:
      min-complexity: 60

  exclusions:
    generated: lax
    warn-unused: false
    paths:
      - '_test\.go'
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - linters:
          - gosec
        text: 'G115'  # integer overflow conversions are intentional in codec/protocol code
      - linters:
          - revive
        text: 'exported:.*stutters'  # pcm.PCM* type names match the established API
      - linters:
          - gocritic
        text: 'dupSubExpr'
        path: 'internal/avgrabber'  # CGO call results are distinct values; gocritic false positive
      - linters:
          - nlreturn
        path: 'internal/avgrabber'  # CGO assignment + return is a single logical unit
      - linters:
          - contextcheck
        path: 'pkg/recorder/recorder\.go'
        text: 'makeOnCloseCallback'  # SegmentCloseInfo callback runs after ctx cancelled; context.Background() is intentional
      # cmd/loadtest is a CLI tool — globals for flags, fmt.Print, and long functions are normal
      - linters:
          - gochecknoglobals
          - forbidigo
          - funlen
          - err113
          - errchkjson
        path: 'cmd/loadtest/'

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
