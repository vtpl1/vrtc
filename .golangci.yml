version: "2"
run:
  timeout: 5m

linters:
  default: all
  disable:
    - depguard
    - wsl
    - wrapcheck
    - mnd
    - varnamelen
    - funlen
    - nonamedreturns
    - paralleltest  # project does not require t.Parallel() in all tests
    - testpackage   # white-box tests in the same package are valid
    - ireturn       # codec factory functions intentionally return interfaces
    - noinlineerr   # inline error handling (if err := ...; err != nil) is valid Go
    - exhaustruct   # struct literals do not need every field explicit
  settings:
    cyclop:
      max-complexity: 30  # codec String() and bitstream parsers legitimately exceed 10
    lll:
      line-length: 180
    varnamelen:
      ignore-names:        
        - a
        - b
        - c
        - c1
        - b    # byte buffer / single byte
        - br   # bit reader
        - bw   # bit writer
        - cf   # chroma format
        - e
        - i
        - in
        - j    # secondary loop index
        - k    # scale factor
        - m
        - n    # loop counter and byte offset
        - ok
        - p    # byte-slice parameter
        - r    # reader
        - s    # struct receiver or writer
        - sd
        - sr   # sample-rate code byte
        - t    # temporary bit value
        - tt
        - u
        - U8
        - v
        - w
        - _b   # byte buffer in NALU parser
    gocognit:
      min-complexity: 60

  exclusions:
    generated: lax
    warn-unused: true
    paths:
      - '_test\.go'
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - linters:
          - revive
        text: 'avoid package names that conflict with Go standard library package names'
      - linters:
          - gochecknoglobals
        path: 'pkg/av/av\.go'  # codec-type constants are intentionally package-level vars
      - linters:
          - gosec
        text: 'G115'  # integer overflow conversions are intentional in codec/protocol code
      - linters:
          - revive
        text: 'var-naming: don''t use ALL_CAPS'  # C-header constant names kept verbatim
      - linters:
          - revive
        text: 'exported:.*stutters'  # pcm.PCM* type names match the established API
      - linters:
          - gocognit
          - nestif
          - funlen
        path: 'pkg/av/codec/(h264|h265)parser'  # SPS/PPS parsing is inherently complex        
      - linters:
          - funcorder
        path: 'pkg/av'  # constructor placement follows original file organisation

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
    - swaggo
