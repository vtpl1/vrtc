info:
  description: |-
    LAN-accessible API for live view, recorded playback, camera management, and analytics.

    ## Architecture

    The edge service runs a dual-hub streaming architecture:

    - **Live Hub** — real-time, zero-delay fan-out from the RTSP source with a 30-second GOP replay buffer.
    - **Analytics Hub** — delayed by ~5 seconds; each video frame is enriched with object-detection analytics via a BlockingMerger that waits for inference results.

    ## Streaming

    Two transports are available for video:

    - **WebSocket MSE** (`/api/cameras/ws/stream`) — bidirectional; supports live, recorded playback, seek/skip, pause/resume, and analytics-enriched mode. Send `{"type":"mse"}` after connect to start streaming.
    - **HTTP chunked fMP4** (`/api/cameras/{cameraId}/stream`) — unidirectional; live or recorded, no seek support.

    Omit the `start` query parameter for live mode; provide an RFC3339 timestamp for recorded playback.

    ## WebSocket Protocol

    All client commands are JSON text frames with `"type": "mse"`. Supported values: start (`""`), `"pause"`, `"resume"`, `"seek"` (with `time` + optional `seq`), `"skip"` (with `offset` + optional `seq`).

    Server sends text frames (`mse`, `seeked`, `mode_change`, `playback_info`, `timing`, `error`) and binary frames (fMP4 init segments + media fragments). All `wallClock` fields use RFC3339 with millisecond precision.

    ## Analytics

    Object-detection analytics are ingested via gRPC and exposed through REST endpoints for historical queries, time-bucketed counts, event filtering, and per-track search. A pure JSON WebSocket stream (`/api/cameras/ws/analytics`) delivers real-time detections without video.
  title: Edge View API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/cameras:
    get:
      description: Returns a paginated list of cameras with live status including codec, resolution, FPS, and whether recording and analytics are active. Use this to populate a camera grid or selector UI.
      operationId: listCameras
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CamerasOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all cameras on this edge device
      tags:
        - Camera
  /api/cameras/config:
    get:
      description: Returns a paginated list of all registered camera channel configurations including stream URL, credentials, site ID, and extra metadata fields. Unlike the `/api/cameras` endpoint which returns live status, this returns the persisted configuration.
      operationId: listCameraConfigs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all registered cameras with full details
      tags:
        - Camera
  /api/cameras/export.csv:
    get:
