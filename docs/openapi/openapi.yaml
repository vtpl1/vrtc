info:
  description: LAN-accessible API for live view, recorded playback, and camera management.
  title: Edge View API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/cameras:
    get:
      operationId: listCameras
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CamerasOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all cameras on this edge device
      tags:
        - Camera
  /api/cameras/config:
    get:
      operationId: listCameraConfigs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all registered cameras with full details
      tags:
        - Camera
  /api/cameras/export.csv:
    get:
      operationId: exportCamerasCSV
      responses:
        "200":
          content:
            text/csv:
              schema:
                contentMediaType: application/octet-stream
                format: binary
                type: string
          description: Camera configuration CSV export
      summary: Export camera configuration as CSV
      tags:
        - Camera
  /api/cameras/import.csv:
    post:
      operationId: importCamerasCSV
      requestBody:
        content:
          text/csv:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  imported:
                    type: integer
                required:
                  - imported
                type: object
          description: Import summary
      summary: Import camera configuration from CSV
      tags:
        - Camera
  /api/cameras/stats:
    get:
      operationId: listCameraStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProducerStatsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Per-camera stream ingestion metrics
      tags:
        - Camera
  /api/cameras/stats/summary:
    get:
      operationId: getSystemStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Aggregated system-wide camera stats
      tags:
        - Camera
  /api/cameras/ws/analytics:
    get:
      description: Streams analytics events as JSON text frames for a single camera.
      operationId: streamCameraAnalyticsWs
      parameters:
        - in: query
          name: cameraId
          required: true
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade for analytics streaming
      summary: WebSocket analytics stream
      tags:
        - Analytics
  /api/cameras/ws/stream:
    get:
      description: Unified WebSocket endpoint. Omit start for live; provide start (RFC3339) for recorded playback. Seek commands switch between modes transparently. Send {"type":"mse"} to start streaming.
      operationId: streamCameraWs
      parameters:
        - in: query
          name: cameraId
          required: true
          schema:
            type: string
        - description: Start time (RFC3339). Omit for live mode.
          in: query
          name: start
          schema:
            format: date-time
            type: string
      responses:
        "101":
          description: WebSocket upgrade for MSE streaming
      summary: WebSocket MSE stream (live + recorded)
      tags:
        - Camera
  /api/cameras/{cameraId}/analytics:
    get:
      operationId: getCameraAnalytics
      parameters:
        - description: Camera identifier
          in: path
          name: cameraId
          required: true
          schema:
            description: Camera identifier
            type: string
        - description: "Start time (RFC3339, default: 24h ago)"
          explode: false
          in: query
          name: start
          schema:
            description: "Start time (RFC3339, default: 24h ago)"
            type: string
        - description: "End time (RFC3339, default: now)"
          explode: false
          in: query
          name: end
          schema:
            description: "End time (RFC3339, default: now)"
            type: string
        - description: Filter by detection class ID
