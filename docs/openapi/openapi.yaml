      parameters:
        - description: Channel identifier
          in: path
          name: id
          required: true
          schema:
            description: Channel identifier
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a camera
      tags:
        - Camera
    get:
      description: Returns the full channel configuration for a single camera including stream URL, credentials, site ID, extra metadata, and generated convenience URLs.
      operationId: getCameraConfig
      parameters:
        - description: Channel identifier
          in: path
          name: id
          required: true
          schema:
            description: Channel identifier
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a camera by ID
      tags:
        - Camera
    put:
      description: Creates a new camera channel or updates an existing one. The channel ID in the path is authoritative. A `streamUrl` (RTSP URL) is required. The response includes generated convenience URLs for the HTTP stream and WebSocket endpoints.
      operationId: upsertCamera
      parameters:
        - description: Channel identifier
          in: path
          name: id
          required: true
          schema:
            description: Channel identifier
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Channel"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create or update a camera
      tags:
        - Camera
