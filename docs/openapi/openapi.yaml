  /api/cameras/ws/analytics:
    get:
      description: |-
        Pure analytics JSON stream — no video data. Subscribes to the AnalyticsHub pub/sub and receives `FrameAnalytics` JSON text frames as detections arrive in real-time.

        Each text frame contains a full analytics payload with detections (bounding boxes, class IDs, confidence scores, track IDs), aggregate counts (people, vehicles, objects), and timing fields (capture, inference timestamps as RFC3339 with milliseconds).

        **Delivery:** non-blocking — slow consumers drop frames. No binary frames are sent.
      operationId: streamCameraAnalyticsWs
      parameters:
        - description: Camera/channel identifier
          in: query
          name: cameraId
          required: true
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade successful. Analytics JSON text frames are sent as detections arrive.
      summary: WebSocket analytics stream (JSON, no video)
      tags:
        - Analytics
  /api/cameras/ws/stream:
    get:
      description: |-
        Unified WebSocket endpoint for live and recorded video playback using Media Source Extensions (MSE).

        ## Connection

        Omit `start` for live mode; provide `start` (RFC3339) for recorded playback. After the WebSocket upgrade, the server sends an initial mode message (`mode_change` for live, `playback_info` for recorded). Send `{"type":"mse"}` to start media delivery.

        ## Client Commands (JSON text frames, `type: "mse"`)

        | Value | Extra Fields | Description |
        |-------|-------------|-------------|
        | `""` | — | Start streaming (required first command) |
        | `"pause"` | — | Pause recorded playback (no-op in live mode) |
        | `"resume"` | — | Resume recorded playback |
        | `"seek"` | `time` (RFC3339 or `"now"`), `seq` (int64, optional) | Absolute seek to wall-clock time |
        | `"skip"` | `offset` (Go duration, e.g. `"-30s"`), `seq` (int64, optional) | Relative seek from current position |

        ## Server Messages (text frames)

        | `type` | Key Fields | Description |
        |--------|-----------|-------------|
        | `mse` | `value` (MIME codec string) | Codec negotiation — use with `addSourceBuffer` / `changeType` |
        | `seeked` | `wallClock`, `mode`, `codecChanged`, `codecs?`, `gap?`, `seq` | Seek completed |
        | `mode_change` | `mode`, `wallClock` | Initial mode (live) |
        | `playback_info` | `mode`, `actualStartWallClock`, `wallClock` | Initial mode (recorded/first_available) |
        | `timing` | `wallClock` | Continuous wall-clock sync on every fragment flush |
        | `error` | `error` | Error message |

        ## Server Messages (binary frames)

        Binary frames contain fMP4 data: first an init segment (`ftyp` + `moov`), then continuous media fragments (`moof` + `mdat`). A new init segment is sent after every codec change.

        ## Seek Behavior

        - **Into recorded footage:** Resolves to the nearest keyframe; `mode: "recorded"`.
        - **Into a gap:** Snaps to the next available segment; `gap: true`.
        - **Beyond recordings:** Switches to live; `mode: "live"`.
        - **`time: "now"`:** Switches to live immediately.
        - **Codec change:** `codecChanged: true` with new `codecs` string; client should call `changeType()`.
        - **Debouncing:** Use monotonically increasing `seq` values; the server discards stale seeks.

        All `wallClock` fields use RFC3339 with millisecond precision.
      operationId: streamCameraWs
      parameters:
        - description: Camera/channel identifier
          in: query
          name: cameraId
          required: true
          schema:
            type: string
        - description: "Playback start time (RFC3339). Omit for live mode. Example: `2026-04-04T14:00:00Z`"
          in: query
          name: start
          schema:
            format: date-time
            type: string
        - description: Set to `true` to receive analytics-enriched frames. In live mode, adds ~5 seconds of latency as each frame waits for detection results. In recorded mode, analytics are injected from persistent storage with negligible overhead.
          in: query
          name: analytics
          schema:
            enum:
              - "true"
              - "false"
            type: string
      responses:
        "101":
          description: WebSocket upgrade successful. The server sends mode information followed by media data after the client sends the start command.
      summary: WebSocket MSE stream (live + recorded)
      tags:
        - Camera
  /api/cameras/{cameraId}/analytics:
    get:
      description: Returns paginated per-frame analytics within a time range. Each frame includes detections (bounding boxes, class IDs, confidence scores, track IDs), aggregate counts (people, vehicles, objects), and timing fields. Optionally filter by detection class ID and minimum confidence. Defaults to the last 24 hours if start/end are omitted.
      operationId: getCameraAnalytics
      parameters:
        - description: Camera identifier
          in: path
          name: cameraId
          required: true
          schema:
            description: Camera identifier
            type: string
        - description: "Start time (RFC3339, default: 24h ago)"
          explode: false
          in: query
          name: start
          schema:
            description: "Start time (RFC3339, default: 24h ago)"
            type: string
        - description: "End time (RFC3339, default: now)"
          explode: false
          in: query
          name: end
          schema:
            description: "End time (RFC3339, default: now)"
            type: string
        - description: Filter by detection class ID
          explode: false
          in: query
          name: classId
          schema:
            description: Filter by detection class ID
            type: string
        - description: Minimum detection confidence (0-100)
          explode: false
          in: query
          name: minConfidence
          schema:
            description: Minimum detection confidence (0-100)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Query frame analytics by time range
      tags:
        - Analytics
