  /api/cameras/{cameraId}/stream:
    get:
      description: |-
        Unified HTTP chunked fMP4 stream. Omit `start` for live; provide `start` (RFC3339) for recorded playback.

        **Live mode:** Attaches to the live relay hub with multi-consumer fan-out. A 30-second GOP replay buffer ensures an instant keyframe on connect.

        **Recorded mode:** Creates a per-session relay hub (`MaxConsumers=1`, blocking delivery — no frame drops). A ChainingDemuxer reads fMP4 segments from disk with monotonic DTS adjustment. When segments are exhausted, playback transitions seamlessly to the live packet buffer (follow mode).

        **Limitations:** HTTP streams are unidirectional — no seek, skip, pause/resume, or analytics enrichment. Use the WebSocket endpoint for interactive playback.
      operationId: streamCamera
      parameters:
        - in: path
          name: cameraId
          required: true
          schema:
            description: Camera/channel identifier
            type: string
        - description: "Playback start time (RFC3339). Omit for live mode. Example: `2026-04-04T14:00:00Z`"
          in: query
          name: start
          schema:
            format: date-time
            type: string
      responses:
        "200":
          content:
            video/mp4: {}
          description: Chunked fMP4 video stream. The response is a continuous stream of fMP4 fragments (init segment followed by moof+mdat pairs) delivered as chunked transfer encoding.
      summary: fMP4 video stream (live + recorded)
      tags:
        - Camera
  /api/cameras/{cameraId}/timeline:
    get:
      description: Returns a simplified timeline of recording availability within a time range. Each entry spans a contiguous recording period; gaps between entries represent periods with no recording. Use this to render a timebar/scrubber UI. Defaults to the last 24 hours if start/end are omitted.
      operationId: getCameraTimeline
      parameters:
        - description: Camera identifier
          in: path
          name: cameraId
          required: true
          schema:
            description: Camera identifier
            type: string
        - description: "Start time (RFC3339, default: 24h ago)"
          explode: false
          in: query
